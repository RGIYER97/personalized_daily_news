name: Daily News Briefing

on:
  workflow_dispatch:
    # Triggered externally by cron-job.org or manually from the Actions tab

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Heartbeat (event + time)
        run: |
          echo "heartbeat_event=${{ github.event_name }}"
          echo "heartbeat_utc=$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "heartbeat_et=$(TZ=America/New_York date '+%Y-%m-%d %I:%M:%S %p %Z')"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Watchlist tickers live in config.py (WATCHLIST_STOCKS) — commit changes to update CI.

      - name: Run briefing
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_GEMINI_FIRST: ${{ secrets.LLM_GEMINI_FIRST }}
          USER_PHONE: ${{ secrets.USER_PHONE }}
          USER_CARRIER: ${{ secrets.USER_CARRIER }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python main.py --now
